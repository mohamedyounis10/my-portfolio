<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed Younis — ML Engineer</title>

<style>
:root{
  --bg:#05050f;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --indigo:#4f46e5;
  --pink:#ec4899;
  --cyan:#06b6d4;
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
  overflow-x:hidden;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ✅ cursor only desktop */
@media (hover: hover) and (pointer: fine) {
  body { cursor:none; }
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:1rem;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.5);
}

.nav-links{
  display:flex;
  gap:1.5rem;
  list-style:none;
}

.nav-links a{
  color:var(--muted);
  text-decoration:none;
}

/* MOBILE NAV FIX */
@media(max-width:600px){
  .nav-links{
    overflow-x:auto;
    white-space:nowrap;
  }
}

/* HERO */
#hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6rem 1rem;
}

.hero-name{
  font-size:clamp(2.5rem,6vw,5rem);
  font-weight:bold;
}

.hero-sub{
  color:var(--muted);
  margin-top:1rem;
}

/* GRID */
.projects{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1rem;
  padding:2rem;
}

@media(max-width:900px){
  .projects{
    grid-template-columns:1fr 1fr;
  }
}

@media(max-width:500px){
  .projects{
    grid-template-columns:1fr;
  }
}

/* CARDS */
.card{
  padding:1.5rem;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
}

/* CONTACT */
.contact{
  padding:2rem;
}

.contact-card{
  margin-bottom:1rem;
  padding:1rem;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;
}

@media(max-width:600px){
  .contact-card{
    width:100%;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>Mohamed</div>
  <ul class="nav-links">
    <li><a href="#">Skills</a></li>
    <li><a href="#">Projects</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="hero">
  <div>
    <h1 class="hero-name">Mohamed Younis</h1>
    <p class="hero-sub">ML Engineer & AI Developer</p>
  </div>
</section>

<!-- PROJECTS -->
<section class="projects">
  <div class="card">Project 1</div>
  <div class="card">Project 2</div>
  <div class="card">Project 3</div>
</section>

<!-- CONTACT -->
<section class="contact">
  <div class="contact-card">Email</div>
  <div class="contact-card">Phone</div>
</section>

<script>
/* ✅ Cursor desktop only */
if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) {

  const dot = document.createElement("div");
  dot.style.cssText = "width:8px;height:8px;background:#06b6d4;position:fixed;border-radius:50%;pointer-events:none;z-index:999";
  document.body.appendChild(dot);

  document.addEventListener("mousemove", e=>{
    dot.style.left = e.clientX + "px";
    dot.style.top = e.clientY + "px";
  });
}

/* ✅ Disable heavy animations on mobile */
const isMobile = window.innerWidth < 768;

if (!isMobile) {
  console.log("Animations ON");
} else {
  console.log("Mobile mode (light)");
}
</script>

</body>
</html>
